name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported version (go.mod), plus the two latest releases.
        go: ['1.22', 'oldstable', 'stable']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Go version
        run: go version

      - name: Check formatting
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::These files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage artifact
        if: matrix.go == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
